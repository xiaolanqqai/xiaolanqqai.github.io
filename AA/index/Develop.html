<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xiaolan - Develop</title>
  <script src="../js/components/header-component.js"></script>
  <script type="text/javascript" src="../js/jquery-3.5.1.min.js"></script>
</head>
<body class="main-content">
  <header class="sticky-header">
    <div class="container-fluid header-nav-container px-4">
      <button onclick="window.location.href = '../index.html'" type="button" class="btn btn-info shadow fw-bold">返回</button>
      <button onclick="window.location.href = 'More.html'" type="button" class="btn btn-info shadow fw-bold">More</button>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="container-fluid mt-3 px-4">
      <div id="nav-content-container"></div>
      <div class="mt-3">
        <div class="alert alert-success shadow" role="alert" id="dependency-info">
          <div class="text-center p-3">
            <i class="fas fa-spinner fa-spin me-2"></i>正在加载系统信息...
          </div>
        </div>
        <div class="alert alert-info shadow" role="alert">旧站点版本 2.4 --><a href="https://xiaolanqqai.github.io/" class="badge badge-light">网址</a></div>
        <div class="alert alert-info shadow" role="alert">旧站点版本 1.0 --><a href="https://xiaolanqqai.github.io/" class="badge badge-light">网址</a></div>
      </div>
    </div>
    <div class="fixed-bottom mx-1">
      <div class="container-fluid">
        <div class="float-end">
          <span class="badge text-black-50">
            <a href="https://xiaolanqqai-sturdy-journey-97xqj446r6wfpw6v.github.dev/" rel="nofollow" target="_blank">Dev</a> •
            <a id="uptime1" href="Develop.html">加载中...</a>
          </span>
          <span id="state1" class="badge text-bg-success">加载中...</span>
          <a><div class="spinner-grow spinner-grow-sm text-info" role="status"></div></a>
        </div>
      </div>
    </div>
  </div>

  <!-- 模块化 Background 组件 -->
  <script src="../js/components/background-component.js"></script>
  <script>
    function renderNavigation(navData) {
      const container = document.getElementById('nav-content-container');
      if (!navData || !navData.tabs) { container.innerHTML = '<div class="alert alert-info">暂无导航数据</div>'; return; }
      container.innerHTML = navData.tabs.map((tab, i) => {
        const items = tab.items.map(item => {
          const icon = item.icon || (item.url
            ? 'https://api.afmax.cn/so/ico/index.php?r=' + encodeURIComponent(item.url)
            : '../img/index.png');
          return '<div class="more-card"><a href="' + item.url +
            '" rel="nofollow" target="_blank" class="nav-ban-item">' +
            '<img class="nav-ban-icon" src="' + icon +
            '" loading="lazy" onerror="this.src=\'../img/index.png\'">' +
            '<h6 class="nav-ban-text">' + (item.name || item.title || '未命名') +
            '</h6></a></div>';
        }).join('');
        return '<div class="mb-4"><div class="alert alert-secondary shadow mb-3" role="alert">' +
          tab.name + '</div><div id="ar' + (i + 1) + '" class="more-grid">' + items + '</div></div>';
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', function () {
      // 加载导航数据
      fetch('../data/nav-data.json')
        .then(r => r.json())
        .then(data => { renderNavigation(data['develop']); loadVersionInfo(data); })
        .catch(() => {
          document.getElementById('nav-content-container').innerHTML = '<div class="alert alert-info mx-3">暂无导航数据，请先上传JSON文件</div>';
          document.getElementById('uptime1').textContent = 'Beta:error';
          document.getElementById('state1').textContent = 'Error';
        });

      // 加载版本信息
      fetch('../data/version-history.json')
        .then(r => r.json())
        .then(data => {
          const depEl = document.getElementById('dependency-info');
          if (depEl && data.dependencies) {
            const deps = data.dependencies;
            depEl.innerHTML = '<h5 class="alert-heading">' + (deps.bootstrap || 'Bootstrap') + '</h5>' +
              '<h5 class="alert-heading">' + (deps.jquery || 'jQuery') + '</h5>' +
              '<h5 class="alert-heading">' + (deps.particles || 'Particles') + '</h5>' +
              '<hr class="my-2"><h5 class="alert-heading">' + (deps.site_data || '网站数据') + '</h5>' +
              '<hr class="my-2"><div id="version-history"></div>';
          }
          const versionEl = document.getElementById('version-history');
          if (!versionEl) return;
          versionEl.innerHTML = data.versions.map((v, i) => {
            let html = '<h4 class="alert-heading">' + v.name +
              (i === 0 ? '<span class="badge badge-danger ms-2">New</span>' : '') + '</h4>' +
              '<h5 class="float-end">' + v.date + '</h5>';
            v.changes.forEach(c => { html += '<p>' + c + '</p>'; });
            if (i < data.versions.length - 1) html += '<hr class="my-2">';
            return html;
          }).join('');
        })
        .catch(() => {
          const versionEl = document.getElementById('version-history');
          if (versionEl) versionEl.innerHTML = '<p>无法加载版本信息</p>';
        });

      $('img').on('error', function () { $(this).attr('src', '../img/index.png'); });
    });
  </script>
</body>
</html>
