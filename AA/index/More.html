<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xiaolan - More</title>
  <script src="../js/components/header-component.js"></script>
  <script type="text/javascript" src="../js/jquery-3.5.1.min.js"></script>
  <script type="text/javascript" src="../js/search_ajx.js"></script>
</head>
<body class="main-content">
  <header class="sticky-header">
    <div class="container-fluid header-nav-container px-4">
      <button onclick="window.location.href = '../index.html'" type="button" class="btn btn-info shadow fw-bold">返回</button>
      <button onclick="window.location.href = 'DD.html'" type="button" class="btn btn-info shadow fw-bold">DD</button>
      <form class="d-flex flex-grow-1 mx-2" role="search" onsubmit="event.preventDefault(); document.getElementById('btn').click();">
        <input id="txt" class="form-control shadow me-2" type="search" placeholder="Search" aria-label="Search"
          onkeypress="handleKeyPress(event)">
        <button id="btn" class="btn btn-outline-success shadow" type="button">Search</button>
      </form>
      <div class="d-flex gap-2 align-items-center">
        <button id="more-s" class="btn btn-info dropdown-toggle shadow" type="button">Baidu</button>
        <button id="more-c" class="btn btn-info shadow oh" type="button">清空</button>
        <div id="more-mm" class="d-none d-flex gap-2">
          <button class="btn btn-info shadow oh" onclick="window.location.href = 'MM-secure.html'" type="button">M-M</button>
          <button class="btn btn-info shadow oh" onclick="window.location.href = 'manager/nav-manager.html'" type="button">manager</button>
        </div>
      </div>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="container-fluid mt-3 px-4">
      <div id="more-b" class="more-grid d-none mb-4">
        <div class="more-card"><a href="javascript:a(0)" class="nav-ban-item"><img class="nav-ban-icon" src="../img/luyou.png" loading="lazy"><h6 class="nav-ban-text">1.</h6></a></div>
        <div class="more-card"><a href="javascript:a(1)" class="nav-ban-item"><img class="nav-ban-icon" src="../img/luyou.png" loading="lazy"><h6 class="nav-ban-text">2.</h6></a></div>
        <div class="more-card"><a href="javascript:a(2)" class="nav-ban-item"><img class="nav-ban-icon" src="../img/luyou.png" loading="lazy"><h6 class="nav-ban-text">192168.</h6></a></div>
        <div class="more-card"><a href="javascript:a(3)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.baidu.com" loading="lazy"><h6 class="nav-ban-text">Baidu</h6></a></div>
        <div class="more-card"><a href="javascript:a(4)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.bing.com" loading="lazy"><h6 class="nav-ban-text">Bing</h6></a></div>
        <div class="more-card"><a href="javascript:a(5)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.google.com" loading="lazy"><h6 class="nav-ban-text">Google.hk</h6></a></div>
        <div class="more-card"><a href="javascript:a(6)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.yandex.com" loading="lazy"><h6 class="nav-ban-text">Yandex</h6></a></div>
        <div class="more-card"><a href="javascript:a(7)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.bilibili.com" loading="lazy"><h6 class="nav-ban-text">BiliBili</h6></a></div>
        <div class="more-card"><a href="javascript:a(8)" class="nav-ban-item"><img class="nav-ban-icon" src="https://api.afmax.cn/so/ico/index.php?r=https%3A%2F%2Fwww.kuaidi100.com" loading="lazy"><h6 class="nav-ban-text">快递100</h6></a></div>
      </div>
      <div id="nav-content-container"></div>
      <div class="mt-4 d-none" id="aav">
        <div class="alert alert-secondary shadow" role="alert">小日本ポートエロ</div>
        <div id="ar21" class="more-grid"></div>
      </div>
    </div>
    <div class="fixed-bottom mx-1">
      <div class="container-fluid">
        <div class="float-end">
          <span class="badge text-black-50">
            <a href="https://xiaolanqqai-sturdy-journey-97xqj446r6wfpw6v.github.dev/" rel="nofollow" target="_blank">Dev</a> •
            <a id="uptime1" href="Develop.html">加载中...</a>
          </span>
          <span id="state1" class="badge text-bg-success">加载中...</span>
          <a><div class="spinner-grow spinner-grow-sm text-info" role="status"></div></a>
        </div>
      </div>
    </div>
  </div>

  <!-- 模块化 Background 组件 -->
  <script src="../js/components/background-component.js"></script>
  <script>
    // 回车搜索
    function handleKeyPress(event) {
      if (event.keyCode === 13) { event.preventDefault(); document.getElementById('btn').click(); return false; }
    }

    // 搜索引擎映射
    const engineNames = ['1.', '2.', '192168', 'Baidu', 'Bing', 'Google.hk', 'Yandex', 'BiliBili', '快递100'];
    const engines = [
      v => 'http://192.168.1.' + v,
      v => 'http://192.168.2.' + v,
      v => 'http://192.168.' + v,
      v => 'https://www.baidu.com/s?wd=' + v,
      v => 'https://www.bing.com/search?q=' + v,
      v => 'https://www.google.com.hk/search?q=' + v,
      v => 'https://yandex.com/search/?text=' + v,
      v => 'https://search.bilibili.com/all?keyword=' + v,
      v => 'https://www.kuaidi100.com/chaxun?com=&nu=' + v
    ];

    const oTxt = document.getElementById('txt');
    const oBtn = document.getElementById('btn');
    const oMoreS = document.getElementById('more-s');
    const oMoreC = document.getElementById('more-b');
    const oMoreCC = document.getElementById('more-c');
    let oMoreB = parseInt(localStorage.getItem('oMoreB') ?? '3');

    // 清除缓存
    oMoreCC.onclick = function () { localStorage.clear(); oTxt.value = ''; };

    // 切换搜索引擎面板
    oMoreS.onclick = function () {
      if (oMoreC.classList.contains('d-none')) { oMoreC.classList.remove('d-none'); window.scrollTo(0, 0); }
      else { oMoreC.classList.add('d-none'); }
    };

    // 初始化搜索引擎名称显示
    function mots() { oMoreS.innerHTML = engineNames[oMoreB]; }

    // 选择搜索引擎
    function a(i) {
      oMoreS.innerHTML = '\u2192' + engineNames[i];
      oMoreB = i;
      localStorage.setItem('oMoreB', i);
    }

    // 搜索按钮
    oBtn.onclick = function () {
      const val = oTxt.value;
      if (!val) { alert('???'); return; }
      // 特殊命令（仅搜索引擎 0）
      if (oMoreB === 0) {
        if (val === '001') {
          document.getElementById('aav').classList.remove('d-none');
          window.scrollTo(0, document.documentElement.scrollHeight);
          oTxt.value = '';
          return;
        } else if (val === '002') { window.open('aa.htm'); oTxt.value = ''; return; }
        else if (val === 'mm') { localStorage.setItem('userName', 'xiaolan'); oTxt.value = ''; return; }
      }
      window.open(engines[oMoreB](val));
      oTxt.value = '';
    };

    // 控制 mm 按钮显示
    if (localStorage.getItem('userName') === 'xiaolan') {
      document.getElementById('more-mm').classList.remove('d-none');
    }

    // 渲染导航
    function renderNavigation(navData) {
      const container = document.getElementById('nav-content-container');
      if (!navData || !navData.tabs) { container.innerHTML = '<div class="alert alert-info">暂无导航数据</div>'; return; }
      container.innerHTML = navData.tabs.map((tab, i) => {
        const items = tab.items.map(item => {
          const icon = item.url
            ? 'https://api.afmax.cn/so/ico/index.php?r=' + encodeURIComponent(item.url)
            : '../img/index.png';
          return '<div class="more-card"><a href="' + item.url +
            '" rel="nofollow" target="_blank" class="nav-ban-item">' +
            '<img class="nav-ban-icon" src="' + icon +
            '" loading="lazy" onerror="this.src=\'../img/index.png\'">' +
            '<h6 class="nav-ban-text">' + (item.name || item.title || '未命名') +
            '</h6></a></div>';
        }).join('');
        return '<div class="mb-4"><div class="alert alert-secondary shadow mb-3" role="alert">' +
          tab.name + '</div><div id="ar' + (i + 1) + '" class="more-grid">' + items + '</div></div>';
      }).join('');
    }

    // 渲染特殊栏目
    function renderSpecialSection(moreData) {
      const container = document.getElementById('ar21');
      if (!moreData || !moreData.special || !moreData.special.sites) return;
      const sites = moreData.special.sites;
      if (!sites.length) { container.innerHTML = '<div class="alert alert-info">暂无特殊栏目数据</div>'; return; }
      container.innerHTML = sites.map(site => {
        const icon = site.icon || 'https://api.afmax.cn/so/ico/index.php?r=' + encodeURIComponent(site.url);
        return '<div class="more-card"><a href="' + site.url +
          '" rel="nofollow" target="_blank" class="nav-ban-item">' +
          '<img class="nav-ban-icon" src="' + icon +
          '" loading="lazy" onerror="this.src=\'../img/index.png\'">' +
          '<h6 class="nav-ban-text">' + site.name + '</h6></a></div>';
      }).join('');
    }

    // 加载导航数据
    document.addEventListener('DOMContentLoaded', function () {
      fetch('../data/nav-data.json')
        .then(r => r.json())
        .then(data => { renderNavigation(data['more']); renderSpecialSection(data['more']); loadVersionInfo(data); })
        .catch(() => {
          document.getElementById('nav-content-container').innerHTML = '<div class="alert alert-info mx-3">暂无导航数据，请先上传JSON文件</div>';
          document.getElementById('uptime1').textContent = 'Beta:error';
          document.getElementById('state1').textContent = 'Error';
        });
      mots();
      $('img').on('error', function () { $(this).attr('src', '../img/index.png'); });
    });
  </script>
</body>
</html>
