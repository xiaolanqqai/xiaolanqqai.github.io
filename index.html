<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xiaolan</title>
  <script src="js/components/header-component.js"></script>
  <script src="js/jquery-3.5.1.min.js"></script>
  <script src="js/search_ajx.js"></script>
  <script src="performance-config.js" defer></script>
</head>
<body class="main-content overflow-y-hidden">
  <div class="content-wrapper d-flex flex-column mx-auto">
    <div class="d-flex flex-column justify-content-end" style="height: 57vh;">
      <div class="mx-auto shadow mt-3 rounded-3">
        <img id="indexing" width="250" src="img/login.png" class="p-1">
      </div>
      <div class="mx-auto mt-3 pt-3">
        <div id="search-engine-container"></div>
        <script src="js/components/search-component.js"></script>
      </div>
    </div>
    <div class="d-flex flex-column justify-content-center pb-5" style="flex: 1;">
      <nav class="p-2 mx-auto">
        <div class="nav nav-tabs shadow rounded-2 justify-content-center" id="nav-tabs-container"></div>
      </nav>
      <div class="mx-auto mt-3 kuaijie" id="nav-content-container"></div>
    </div>
    <div class="fixed-bottom mx-1">
      <div class="container-fluid">
        <div class="float-start fw-light">
          <span id="jinrishici-sentence">正在加载今日诗词....</span>
        </div>
        <div class="float-end">
          <span class="badge text-black-50">
            <a href="test/index.html" rel="nofollow" target="_blank">Ts</a> •
            <a href="https://xiaolanqqai-sturdy-journey-97xqj446r6wfpw6v.github.dev/" rel="nofollow" target="_blank">Dev</a> •
            <a id="uptime1" href="index/Develop.html">加载中...</a>
          </span>
          <span id="state1" class="badge text-bg-success">加载中...</span>
          <a><div class="spinner-grow spinner-grow-sm text-info" role="status"></div></a>
        </div>
      </div>
    </div>
  </div>

  <!-- 模块化 Background 组件 -->
  <script src="js/components/background-component.js"></script>
  <script>
    // 异步加载脚本
    function loadScript(src, callback) {
      const script = document.createElement('script');
      script.src = src;
      script.onload = callback;
      document.head.appendChild(script);
    }

    // Logo 映射
    const logoMap = {
      0: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae315f6.jpg',
      1: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae315f6.jpg',
      2: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae315f6.jpg',
      3: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae316a3.gif',
      4: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae31849.webp',
      5: 'https://pic.imgdb.cn/item/659e4f59871b83018ae31580.gif',
      6: 'https://pic.imgdb.cn/item/659e501d871b83018ae61acb.webp',
      7: 'https://pic.imgdb.cn/item/659e4f5a871b83018ae317c6.gif',
      8: 'https://pic.imgdb.cn/item/659e501d871b83018ae61a59.png'
    };
    const indexing = document.getElementById('indexing');
    const oMoreB = parseInt(localStorage.getItem('oMoreB') ?? '3');
    indexing.src = logoMap[oMoreB] ?? logoMap[3];

    // 回车搜索
    function handleKeyPress(event) {
      if (event.keyCode === 13) {
        event.preventDefault();
        const form = document.querySelector('#search-engine-container form');
        if (form) {
          if (typeof submitFn === 'function') {
            submitFn(form, event);
          } else {
            const btn = document.querySelector('.search-icon');
            if (btn) btn.click();
          }
        }
        return false;
      }
    }

    // 导航标签切换
    function switchTab(tabId) {
      document.querySelectorAll('.nav-ban').forEach(el => {
        el.classList.add('d-none');
        el.style.display = 'none';
      });
      document.querySelectorAll('.nav-top').forEach(el => el.classList.remove('active'));
      const content = document.getElementById('tab-' + tabId);
      const tab = document.querySelector('[data-tab="' + tabId + '"]');
      if (content) { content.classList.remove('d-none'); content.style.display = 'block'; }
      if (tab) tab.classList.add('active');
    }

    // 渲染导航
    function renderNavigation(navData) {
      const tabsEl = document.getElementById('nav-tabs-container');
      const contentEl = document.getElementById('nav-content-container');

      // 渲染标签
      tabsEl.innerHTML = navData.tabs.map((tab, i) => {
        const tabId = tab.name.toLowerCase().replace(/\s+/g, '-');
        return '<a class="nav-link btn nav-top ' + (i === 0 ? 'active' : '') +
          '" data-tab="' + tabId + '" href="#">' + tab.name + '</a>';
      }).join('') + '<a class="nav-link btn nav-top" href="index/tool.html">Tool</a><a class="nav-link btn nav-top" href="index/More.html">...</a>';

      // 绑定标签事件
      tabsEl.querySelectorAll('.nav-top[data-tab]').forEach(el => {
        const tabId = el.getAttribute('data-tab');
        el.addEventListener('click', e => { e.preventDefault(); switchTab(tabId); });
        el.addEventListener('mouseenter', () => switchTab(tabId));
      });

      // 渲染内容面板
      contentEl.innerHTML = navData.tabs.map((tab, i) => {
        const tabId = tab.name.toLowerCase().replace(/\s+/g, '-');
        const items = tab.items.map(item => {
          const icon = item.url
            ? 'https://api.afmax.cn/so/ico/index.php?r=' + encodeURIComponent(item.url)
            : 'img/index.png';
          return '<div class="col"><a href="' + item.url +
            '" rel="nofollow" target="_blank" class="nav-ban-item">' +
            '<img class="nav-ban-icon" src="' + icon +
            '" loading="lazy" onerror="this.src=\'img/index.png\'">' +
            '<h6 class="nav-ban-text">' + (item.name || item.title || '未命名') +
            '</h6></a></div>';
        }).join('');
        return '<div class="nav-ban ' + (i === 0 ? '' : 'd-none') +
          '" id="tab-' + tabId + '" style="display:' + (i === 0 ? 'block' : 'none') +
          '"><div class="row row-cols-4 g-2 p-2">' + items + '</div></div>';
      }).join('');
    }

    // 加载导航数据（带重试）
    function loadNavData(retryCount = 0) {
      fetch('data/nav-data.json?t=' + Date.now())
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => { renderNavigation(data.index); loadVersionInfo(data); })
        .catch(() => {
          if (retryCount < 2) { setTimeout(() => loadNavData(retryCount + 1), 1000); return; }
          const el = document.getElementById('nav-tabs-container');
          if (el) el.innerHTML = '<div class="alert alert-danger">加载数据失败，请检查网络或刷新页面</div>';
          const uptime = document.getElementById('uptime1');
          if (uptime) uptime.textContent = 'Beta:error';
          const state = document.getElementById('state1');
          if (state) state.textContent = 'Error';
        });
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function () {
      loadScript('js/bootstrap.bundle.min.js');
      loadScript('https://sdk.jinrishici.com/v2/browser/jinrishici.js', function () {
        if (window.jinrishici) {
          jinrishici.load(function (result) {
            const el = document.getElementById('jinrishici-sentence');
            if (el) el.innerHTML = result.data.content;
          });
        }
      });
      loadNavData();
    });
  </script>
</body>
</html>
