<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xiaolan - Network Tool</title>
  <script src="../../js/components/header-component.js"></script>
  <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
</head>
<body class="main-content">
  <header class="sticky-header">
    <div class="container-fluid header-nav-container px-4">
      <button onclick="window.location.href = '../../index.html'" type="button" class="btn btn-info shadow fw-bold">返回</button>
      <button onclick="window.location.href = '../tool.html'" type="button" class="btn btn-info shadow fw-bold">Tool</button>
      <button onclick="window.location.href = '../More.html'" type="button" class="btn btn-info shadow fw-bold">More</button>
      <button onclick="window.location.href = '../Develop.html'" type="button" class="btn btn-info shadow fw-bold">Develop</button>
    </div>
  </header>

  <div class="content-wrapper">
    <div id="tool-scanner-container"></div>
    <div class="fixed-bottom mx-1">
      <div class="container-fluid">
        <div class="float-end">
          <span class="badge text-black-50">
            <a href="https://xiaolanqqai-sturdy-journey-97xqj446r6wfpw6v.github.dev/" rel="nofollow" target="_blank">Dev</a> •
            <a id="uptime1" href="../Develop.html">加载中...</a>
          </span>
          <span id="state1" class="badge text-bg-success">加载中...</span>
          <a><div class="spinner-grow spinner-grow-sm text-info" role="status"></div></a>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/components/background-component.js"></script>
  <script src="../../js/components/tool-scanner-component.js"></script>
  <script src="../../js/tool-scanner.js"></script>
  <script>
    function applyFooterVersion(data, retryCount) {
      if (typeof loadVersionInfo === 'function') {
        loadVersionInfo(data);
        return;
      }

      if (retryCount < 10) {
        setTimeout(function () { applyFooterVersion(data, retryCount + 1); }, 200);
        return;
      }

      document.getElementById('uptime1').textContent = 'Beta:Unknown';
      if (typeof checkPageStatus === 'function') {
        checkPageStatus();
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      fetch('../../data/nav-data.json')
        .then(function (response) { return response.json(); })
        .then(function (data) { applyFooterVersion(data, 0); })
        .catch(function () {
          document.getElementById('uptime1').textContent = 'Beta:error';
          document.getElementById('state1').textContent = 'Error';
        });
    });
  </script>
</body>
</html>
