<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Xiaolan - Tool</title>
  <script src="../js/components/header-component.js"></script>
  <script type="text/javascript" src="../js/jquery-3.5.1.min.js"></script>
</head>
<body class="main-content">
  <header class="sticky-header">
    <div class="container-fluid header-nav-container px-4">
      <button onclick="window.location.href = '../index.html'" type="button" class="btn btn-info shadow fw-bold">返回</button>
      <button onclick="window.location.href = 'More.html'" type="button" class="btn btn-info shadow fw-bold">More</button>
      <button onclick="window.location.href = 'Develop.html'" type="button" class="btn btn-info shadow fw-bold">Develop</button>
    </div>
  </header>

  <div class="content-wrapper">
    <section class="tool-shell container-fluid px-4">
      <div class="tool-center-wrap">
        <div class="tool-panel shadow-lg">
          <div class="tool-panel-header text-center">
            <h1 class="tool-title">
              工具集
              <span class="tool-info-wrap" tabindex="0" aria-label="说明">
                <span class="tool-info-icon">i</span>
                <span class="tool-info-pop">
                  选择需要使用的单页工具。新工具会由管理员通过管理页面同步发布到此页面。
                </span>
              </span>
            </h1>
          </div>

          <div id="tool-projects-status" class="alert alert-info shadow tool-status" role="alert">正在加载工具列表...</div>

          <div class="tool-results-box">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="tool-result-title mb-0">可用工具</h2>
              <span class="badge text-bg-secondary">共 <span id="tool-project-count">0</span> 个</span>
            </div>
            <div id="tool-projects-list" class="tool-results-list"></div>
          </div>
        </div>
      </div>
    </section>

    <div class="fixed-bottom mx-1">
      <div class="container-fluid">
        <div class="float-end">
          <span class="badge text-black-50">
            <a href="https://xiaolanqqai-sturdy-journey-97xqj446r6wfpw6v.github.dev/" rel="nofollow" target="_blank">Dev</a> •
            <a id="uptime1" href="Develop.html">加载中...</a>
          </span>
          <span id="state1" class="badge text-bg-success">加载中...</span>
          <a><div class="spinner-grow spinner-grow-sm text-info" role="status"></div></a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/components/background-component.js"></script>
  <script>
    const iconColorMap = {
      'fa-network-wired': 'text-info',
      'fa-wrench': 'text-primary',
      'fa-calculator': 'text-success',
      'fa-key': 'text-warning',
      'fa-tools': 'text-danger'
    };
    const defaultIcon = 'fa-tools';

    function renderProjects(projects) {
      const list = document.getElementById('tool-projects-list');
      const count = document.getElementById('tool-project-count');
      const status = document.getElementById('tool-projects-status');

      if (!Array.isArray(projects) || projects.length === 0) {
        count.textContent = '0';
        list.innerHTML = '<div class="alert alert-secondary shadow-sm mb-0">暂无可用工具，请等待管理员添加。</div>';
        status.className = 'alert alert-warning shadow tool-status';
        status.textContent = '当前没有可显示的工具。';
        return;
      }

      count.textContent = String(projects.length);
      status.className = 'alert alert-success shadow tool-status';
      status.textContent = `已加载 ${projects.length} 个工具，点击卡片即可打开。`;

      list.innerHTML = projects.map((project) => {
        const icon = project.icon || defaultIcon;
        const colorClass = iconColorMap[icon] || 'text-primary';
        const file = encodeURIComponent(project.file);
        const desc = project.description || '暂无简介';
        return `
          <a class="tool-port-chip tool-project-card" href="Tool/${file}" target="_blank" rel="nofollow noopener">
            <span class="${colorClass}"><i class="fas ${icon}"></i></span>
            <span class="tool-project-name">${project.name}</span>
            <span class="tool-port-title">${desc}</span>
          </a>
        `;
      }).join('');
    }

    function loadProjects(retryCount) {
      retryCount = retryCount || 0;
      fetch('../data/tool-projects.json?t=' + Date.now())
        .then(function (response) {
          if (!response.ok) throw new Error(response.status);
          return response.json();
        })
        .then(function (data) {
          renderProjects((data && data.projects) || []);
        })
        .catch(function () {
          if (retryCount < 2) {
            setTimeout(function () { loadProjects(retryCount + 1); }, 1000);
            return;
          }
          const status = document.getElementById('tool-projects-status');
          status.className = 'alert alert-danger shadow tool-status';
          status.textContent = '工具列表加载失败，请检查网络或刷新页面。';
        });
    }

    function applyFooterVersion(data, retryCount) {
      if (typeof loadVersionInfo === 'function') {
        loadVersionInfo(data);
        return;
      }
      if (retryCount < 10) {
        setTimeout(function () { applyFooterVersion(data, retryCount + 1); }, 200);
        return;
      }
      document.getElementById('uptime1').textContent = 'Beta:Unknown';
      if (typeof checkPageStatus === 'function') {
        checkPageStatus();
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      loadProjects(0);
      fetch('../data/nav-data.json')
        .then(function (response) { return response.json(); })
        .then(function (data) { applyFooterVersion(data, 0); })
        .catch(function () {
          document.getElementById('uptime1').textContent = 'Beta:error';
          document.getElementById('state1').textContent = 'Error';
        });
    });
  </script>
</body>
</html>
