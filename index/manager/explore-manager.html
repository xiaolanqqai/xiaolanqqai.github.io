<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>探索网页系统</title>

    <!-- 模块化 Header 组件 -->
    <script src="../../js/components/header-component.js"></script>
    <script src="../../js/components/manager-component.js"></script>

    <!-- 引入通用脚本 -->
    <script src="../../js/github-api-helper.js"></script>
    <script src="../../js/manager-common.js"></script>
</head>

<body class="manager-body">
    <div class="container container-main">
        <!-- GitHub 同步功能卡片 -->
        <div class="manager-card mb-4 border-primary">
            <div class="manager-card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fab fa-github me-2"></i>GitHub 云端同步</h5>
            </div>
            <div class="manager-card-body">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <p class="mb-0 text-muted small">
                            直接同步发现的网站数据和您的个人收藏到 GitHub 仓库。
                        </p>
                    </div>
                    <div class="col-md-4 text-end">
                        <button id="syncToGithubBtn" class="btn btn-primary">
                            <i class="fas fa-cloud-upload-alt me-1"></i> 立即同步
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 标签页切换 -->
        <div class="mb-4">
            <ul class="nav nav-tabs" id="exploreTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorites"
                        type="button" role="tab" aria-controls="favorites" aria-selected="true">我的收藏</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history"
                        type="button" role="tab" aria-controls="history" aria-selected="false">最近点击</button>
                </li>
            </ul>
        </div>

        <!-- 工具箱模块 -->
        <div class="manager-card mb-4">
            <div class="manager-card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-bookmark me-2"></i>浏览器收藏夹</h5>
                <div class="btn-group">
                    <button id="syncLocalBtn" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-sync me-1"></i> 本地同步
                    </button>
                    <button id="importBookmarksBtn" class="btn btn-sm btn-primary">
                        <i class="fas fa-file-import me-1"></i> 导入 HTML
                    </button>
                    <button id="refreshBookmarks" class="btn btn-sm btn-light">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
                <input type="file" id="importBookmarksFile" accept=".html" style="display:none">
            </div>
            <div class="manager-card-body">
                <div class="alert alert-info py-2 mb-3 small">
                    <i class="fas fa-info-circle me-1"></i>
                    由于浏览器安全限制，无法直接访问收藏夹。您可以：<br>
                    1. 运行本地脚本 <code>node scripts/get_bookmarks.js</code> 自动同步（推荐）；<br>
                    2. 在浏览器中将收藏夹导出为 <strong>HTML 文件</strong>，然后点击“导入”按钮。
                </div>
                <p class="text-muted mb-3 small">以下是已导入的收藏网站，按文件夹分类显示：</p>

                <!-- 收藏夹内容将由JavaScript动态生成 -->
                <div id="bookmarksContainer">
                    <div class="text-center py-5">
                        <i class="fas fa-bookmark fa-3x text-muted mb-3"></i>
                        <p class="text-muted">点击上方“导入”按钮上传浏览器导出的 HTML 收藏夹文件</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 标签页内容 -->
        <div class="tab-content border-0 p-0 bg-transparent" id="exploreTabContent">

            <!-- 收藏标签页 -->
            <div class="tab-pane fade show active" id="favorites" role="tabpanel" aria-labelledby="favorites-tab">
                <div class="favorites-list" id="favoritesList">
                    <div class="alert alert-info text-center p-5">
                        <i class="fas fa-star text-warning mb-3 fs-1"></i>
                        <h4>还没有收藏网站</h4>
                        <p class="mb-0">从您的浏览器收藏夹导入，或在导航页点击收藏</p>
                    </div>
                </div>
            </div>

            <!-- 最近点击标签页 -->
            <div class="tab-pane fade" id="history" role="tabpanel" aria-labelledby="history-tab">
                <div class="manager-card border-info">
                    <div
                        class="manager-card-header bg-info text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-history me-2"></i>最近点击 (点击次数 ≥ 2)</h5>
                        <div class="btn-group">
                            <button id="selectAllHistory" class="btn btn-sm btn-light">全选</button>
                            <button id="generateHistoryBtn" class="btn btn-sm btn-primary">生成 History 类目</button>
                        </div>
                    </div>
                    <div class="manager-card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0" id="historyTable">
                                <thead class="table-light">
                                    <tr>
                                        <th width="40"><input type="checkbox" id="historyMainCheckbox"></th>
                                        <th>网站标题</th>
                                        <th>URL</th>
                                        <th width="100">点击次数</th>
                                    </tr>
                                </thead>
                                <tbody id="historyList">
                                    <!-- 历史记录将在这里动态生成 -->
                                    <tr>
                                        <td colspan="4" class="text-center py-4">
                                            <i class="fas fa-spinner fa-spin me-2"></i>正在加载历史记录...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="historyPagination" class="p-3 d-flex justify-content-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 探索网页系统JavaScript -->
    <script>
        // 快捷访问 managerCommon
        const common = window.managerCommon || (typeof ManagerCommon !== 'undefined' ? new ManagerCommon() : null);
        if (common && !window.managerCommon) window.managerCommon = common;

        document.addEventListener('DOMContentLoaded', function () {
            // 初始化模态框
            // (所有模态框已移除)

            // GitHub 相关逻辑
            const syncToGithubBtn = document.getElementById('syncToGithubBtn');

            // 同步到 GitHub
            if (syncToGithubBtn) {
                syncToGithubBtn.addEventListener('click', async function () {
                    if (!common) return;
                    try {
                        const data = {
                            favorites: favorites,
                            lastUpdated: new Date().toISOString()
                        };
                        await common.syncToGithub('data/explore-data.json', data);
                    } catch (error) {
                        // 错误已由 common.syncToGithub 处理
                    }
                });
            }

            // 从 GitHub 加载数据
            async function loadFromGithub() {
                try {
                    const data = await common.getFromGithub('data/explore-data.json');
                    if (data) {
                        if (data.favorites) {
                            favorites.length = 0;
                            favorites.push(...data.favorites);
                            localStorage.setItem('explore-favorites', JSON.stringify(favorites));
                        }

                        renderFavorites();
                        common.log('从 GitHub 加载收藏数据成功', 'success');
                    }
                } catch (error) {
                    console.error('从 GitHub 加载数据失败:', error);
                }
            }

            // 获取本地存储的收藏网站
            let favorites = JSON.parse(localStorage.getItem('explore-favorites')) || [];

            // 渲染收藏列表
            function renderFavorites() {
                const container = document.getElementById('favoritesList');

                if (favorites.length === 0) {
                    container.innerHTML = `
                        <div class="alert alert-info text-center p-5">
                            <i class="fas fa-star text-warning mb-2 fs-3r"></i>
                            <h4 class="mt-2">还没有收藏网站</h4>
                            <p class="mb-0">从您的浏览器收藏夹导入，或在导航页点击收藏</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';

                favorites.forEach(site => {
                    const listItem = document.createElement('div');
                    listItem.className = 'list-group-item favorites-list-item p-4';

                    listItem.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${site.name || site.title || '未命名'}</h5>
                                <p class="mb-0 text-muted">${site.description || site.url}</p>
                            </div>
                            <div>
                                <a href="${site.url}" target="_blank" class="btn btn-sm btn-outline-primary me-2">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                                <button class="btn btn-sm btn-outline-danger remove-favorite" data-id="${site.id}">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;

                    // 添加移除收藏点击事件
                    listItem.querySelector('.remove-favorite').addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeFavorite(site.id);
                        renderFavorites();
                    });

                    container.appendChild(listItem);
                });
            }

            // 移除收藏
            function removeFavorite(siteId) {
                favorites = favorites.filter(fav => fav.id !== siteId);
                localStorage.setItem('explore-favorites', JSON.stringify(favorites));
                common.showAlert('已从收藏中移除');
            }

            // 初始化标签页切换
            function initTabs() {
                const tabButtons = document.querySelectorAll('#exploreTabs button');

                tabButtons.forEach(button => {
                    button.addEventListener('shown.bs.tab', () => {
                        if (button.id === 'favorites-tab') {
                            renderFavorites();
                        } else if (button.id === 'history-tab') {
                            renderHistoryList();
                        }
                    });
                });
            }

            // --- 最近点击 (History) 功能逻辑 ---
            let historyRecords = [];
            const HISTORY_PAGE_SIZE = 10;
            let currentHistoryPage = 1;

            // 加载历史记录
            function loadHistoryRecords() {
                historyRecords = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('nav_history_click_')) {
                        try {
                            const data = JSON.parse(localStorage.getItem(key));
                            // 过滤点击次数 >= 2
                            if (data && data.count >= 2) {
                                historyRecords.push(data);
                            }
                        } catch (e) {
                            console.error('解析历史记录失败:', e);
                        }
                    }
                }
                // 按点击次数降序排列
                historyRecords.sort((a, b) => b.count - a.count);
            }

            // 渲染历史记录列表
            function renderHistoryList() {
                loadHistoryRecords();
                const container = document.getElementById('historyList');
                const paginationContainer = document.getElementById('historyPagination');

                if (historyRecords.length === 0) {
                    container.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">暂无点击次数超过2次的记录</td></tr>`;
                    paginationContainer.innerHTML = '';
                    return;
                }

                const totalPages = Math.ceil(historyRecords.length / HISTORY_PAGE_SIZE);
                const start = (currentHistoryPage - 1) * HISTORY_PAGE_SIZE;
                const end = start + HISTORY_PAGE_SIZE;
                const pagedRecords = historyRecords.slice(start, end);

                container.innerHTML = '';
                pagedRecords.forEach(record => {
                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.innerHTML = `
                        <td><input type="checkbox" class="history-item-checkbox" data-url="${record.url}" data-title="${record.title}" data-count="${record.count}"></td>
                        <td class="text-truncate" style="max-width: 200px;" title="${record.title}">${record.title}</td>
                        <td class="text-truncate" style="max-width: 300px;"><a href="${record.url}" target="_blank" class="history-link">${record.url}</a></td>
                        <td><span class="badge bg-info">${record.count}</span></td>
                    `;

                    // 点击行时打开链接（排除点击复选框和链接本身的情况）
                    tr.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('history-item-checkbox') && e.target.tagName !== 'A') {
                            window.open(record.url, '_blank');
                        }
                    });

                    container.appendChild(tr);
                });

                // 渲染分页
                renderHistoryPagination(totalPages);

                // 重置全选状态
                document.getElementById('historyMainCheckbox').checked = false;
            }

            function renderHistoryPagination(totalPages) {
                const container = document.getElementById('historyPagination');
                if (totalPages <= 1) {
                    container.innerHTML = '';
                    return;
                }

                let html = '<nav><ul class="pagination pagination-sm mb-0">';
                for (let i = 1; i <= totalPages; i++) {
                    html += `<li class="page-item ${i === currentHistoryPage ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
                }
                html += '</ul></nav>';
                container.innerHTML = html;

                container.querySelectorAll('.page-link').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        currentHistoryPage = parseInt(link.dataset.page);
                        renderHistoryList();
                    });
                });
            }

            // 初始化历史记录功能
            function initHistoryActions() {
                const mainCheckbox = document.getElementById('historyMainCheckbox');
                const selectAllBtn = document.getElementById('selectAllHistory');
                const generateBtn = document.getElementById('generateHistoryBtn');

                // 全选/反选 (当前页)
                mainCheckbox.addEventListener('change', () => {
                    document.querySelectorAll('.history-item-checkbox').forEach(cb => {
                        cb.checked = mainCheckbox.checked;
                    });
                });

                // 全选按钮 (所有页)
                selectAllBtn.addEventListener('click', () => {
                    const isAllSelected = Array.from(document.querySelectorAll('.history-item-checkbox')).every(cb => cb.checked);
                    document.querySelectorAll('.history-item-checkbox').forEach(cb => {
                        cb.checked = !isAllSelected;
                    });
                    mainCheckbox.checked = !isAllSelected;
                });

                // 生成 History 类目并写入 JSON
                generateBtn.addEventListener('click', async () => {
                    const selectedCheckboxes = document.querySelectorAll('.history-item-checkbox:checked');
                    if (selectedCheckboxes.length === 0) {
                        common.showAlert('请至少勾选一条记录', 'warning');
                        return;
                    }

                    const selectedSites = Array.from(selectedCheckboxes).map(cb => ({
                        name: cb.dataset.title,
                        title: cb.dataset.title,
                        url: cb.dataset.url,
                        count: parseInt(cb.dataset.count),
                        icon: `https://api.afmax.cn/so/ico/index.php?r=${encodeURIComponent(cb.dataset.url)}`
                    }));

                    try {
                        common.showLoading('正在更新导航数据...');

                        // 获取当前的 nav-data.json
                        const response = await fetch('../../data/nav-data.json?t=' + Date.now());
                        if (!response.ok) throw new Error('读取 nav-data.json 失败');
                        const navData = await response.json();

                        // 确保 History 类目存在
                        if (!navData.index.tabs.find(t => t.name === 'History')) {
                            // 查找 Network 的位置
                            const networkIndex = navData.index.tabs.findIndex(t => t.name === 'Network');
                            const historyTab = {
                                name: "History",
                                items: selectedSites
                            };

                            if (networkIndex !== -1) {
                                navData.index.tabs.splice(networkIndex + 1, 0, historyTab);
                            } else {
                                navData.index.tabs.push(historyTab);
                            }
                        } else {
                            // 更新现有的 History 类目
                            const historyTab = navData.index.tabs.find(t => t.name === 'History');
                            // 合并并去重
                            selectedSites.forEach(newSite => {
                                const existingIndex = historyTab.items.findIndex(s => s.url === newSite.url);
                                if (existingIndex !== -1) {
                                    historyTab.items[existingIndex] = newSite;
                                } else {
                                    historyTab.items.push(newSite);
                                }
                            });
                        }

                        // 同步到 GitHub (借用 common.syncToGithub)
                        await common.syncToGithub('data/nav-data.json', navData, `Update History category with ${selectedSites.length} sites`);

                        common.hideLoading();
                        common.showAlert(`成功生成并同步！导入了 ${selectedSites.length} 条记录。`, 'success');
                        common.log('成功更新了 History 类目', 'success', `导入记录数: ${selectedSites.length}`);
                    } catch (error) {
                        common.hideLoading();
                        common.handleError(error, '生成 History 类目');
                    }
                });
            }

            // 初始化所有功能
            function init() {
                renderFavorites();
                initTabs();
                initHistoryActions(); // 初始化历史记录动作

                // 尝试从 GitHub 加载最新数据
                loadFromGithub();

                // 显示欢迎消息
                common.showAlert('欢迎使用探索网页系统！管理您的个人收藏和浏览历史。');
                common.log('探索网页系统已加载', 'info');
            }

            // 启动应用
            init();
        });
    </script>

    <!-- 工具箱模块JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const syncLocalBtn = document.getElementById('syncLocalBtn');
            const importBtn = document.getElementById('importBookmarksBtn');
            const fileInput = document.getElementById('importBookmarksFile');
            const refreshBtn = document.getElementById('refreshBookmarks');
            const container = document.getElementById('bookmarksContainer');

            // 从本地存储加载收藏夹
            let savedBookmarks = JSON.parse(localStorage.getItem('imported-bookmarks')) || null;

            // 本地同步按钮点击
            syncLocalBtn.addEventListener('click', async function () {
                try {
                    const response = await fetch('../../data/local-bookmarks.json?t=' + Date.now());
                    if (!response.ok) throw new Error('未找到本地同步文件，请先运行 scripts/get_bookmarks.py');

                    const data = await response.json();
                    savedBookmarks = data;
                    localStorage.setItem('imported-bookmarks', JSON.stringify(savedBookmarks));
                    renderBookmarks(savedBookmarks, container);

                    if (window.managerCommon) {
                        window.managerCommon.showAlert('本地同步成功！', 'success');
                        window.managerCommon.log('成功从本地同步了收藏夹', 'success');
                    }
                } catch (error) {
                    console.error('Sync failed:', error);
                    if (window.managerCommon) {
                        window.managerCommon.showAlert(error.message, 'error');
                    } else {
                        alert(error.message);
                    }
                }
            });

            // 渲染收藏夹函数
            function renderBookmarks(bookmarks, container) {
                container.innerHTML = '';

                if (!bookmarks || !bookmarks.children || bookmarks.children.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <i class="fas fa-bookmark fa-3x text-muted mb-3"></i>
                            <p class="text-muted">暂无导入的数据，请点击上方“导入”按钮</p>
                        </div>
                    `;
                    return;
                }

                // 递归渲染文件夹和书签
                function renderLevel(items, parentContainer) {
                    items.forEach(item => {
                        if (item.children) {
                            // 文件夹
                            const folderElement = document.createElement('div');
                            folderElement.className = 'bookmark-folder';

                            const folderHeader = document.createElement('div');
                            folderHeader.className = 'bookmark-folder-header';
                            folderHeader.innerHTML = `
                                <i class="fas fa-chevron-right"></i>
                                <span>${item.title}</span>
                                <span class="ms-2 badge bg-primary rounded-pill">${item.children.length}</span>
                            `;

                            const bookmarkItemsContainer = document.createElement('div');
                            bookmarkItemsContainer.className = 'bookmark-items';
                            bookmarkItemsContainer.style.display = 'none'; // 默认折叠

                            folderHeader.addEventListener('click', function () {
                                const icon = folderHeader.querySelector('i');
                                icon.classList.toggle('fa-chevron-down');
                                icon.classList.toggle('fa-chevron-right');
                                folderHeader.classList.toggle('active');
                                bookmarkItemsContainer.style.display = bookmarkItemsContainer.style.display === 'none' ? 'grid' : 'none';
                            });

                            renderLevel(item.children, bookmarkItemsContainer);

                            folderElement.appendChild(folderHeader);
                            folderElement.appendChild(bookmarkItemsContainer);
                            parentContainer.appendChild(folderElement);
                        } else {
                            // 书签
                            const bookmarkItem = document.createElement('a');
                            bookmarkItem.className = 'bookmark-item';
                            bookmarkItem.href = item.url;
                            bookmarkItem.target = '_blank';

                            let faviconHtml = '';
                            if (item.iconUrl && item.iconUrl.startsWith('data:')) {
                                faviconHtml = `<img src="${item.iconUrl}" alt="" class="bookmark-favicon">`;
                            } else {
                                const domain = new URL(item.url).hostname;
                                faviconHtml = `<img src="https://www.google.com/s2/favicons?domain=${domain}" alt="" class="bookmark-favicon">`;
                            }

                            bookmarkItem.innerHTML = `
                                ${faviconHtml}
                                <span class="bookmark-title" title="${item.title}">${item.title}</span>
                            `;

                            parentContainer.appendChild(bookmarkItem);
                        }
                    });
                }

                renderLevel(bookmarks.children, container);
            }

            // 解析 HTML 收藏夹 (Netscape Bookmark 格式)
            function parseBookmarksHTML(htmlContent) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const rootDL = doc.querySelector('dl'); // Netscape 格式通常使用小写或大写

                if (!rootDL) {
                    // 尝试更通用的查询
                    const anyDL = doc.getElementsByTagName('dl')[0];
                    if (!anyDL) return null;
                    return { title: "导入的收藏夹", children: parseDL(anyDL) };
                }

                function parseDL(dl) {
                    const children = [];
                    // 获取直接子元素 DT
                    const dts = Array.from(dl.children).filter(child => child.tagName === 'DT');

                    dts.forEach(dt => {
                        const h3 = dt.querySelector(':scope > h3');
                        const a = dt.querySelector(':scope > a');
                        const nextDL = dt.querySelector(':scope > dl');

                        if (h3 && nextDL) {
                            // 文件夹
                            children.push({
                                title: h3.textContent,
                                children: parseDL(nextDL)
                            });
                        } else if (a) {
                            // 书签
                            children.push({
                                title: a.textContent,
                                url: a.href,
                                iconUrl: a.getAttribute('icon') || ''
                            });
                        }
                    });
                    return children;
                }

                return {
                    title: "导入的收藏夹",
                    children: parseDL(rootDL)
                };
            }

            // 导入按钮点击
            importBtn.addEventListener('click', () => fileInput.click());

            // 文件选择处理
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (event) {
                    const content = event.target.result;
                    const parsed = parseBookmarksHTML(content);

                    if (parsed && parsed.children && parsed.children.length > 0) {
                        savedBookmarks = parsed;
                        localStorage.setItem('imported-bookmarks', JSON.stringify(savedBookmarks));
                        renderBookmarks(savedBookmarks, container);
                        if (window.managerCommon) {
                            window.managerCommon.showAlert('收藏夹导入成功！', 'success');
                            window.managerCommon.log('成功导入了浏览器收藏夹', 'success');
                        }
                    } else {
                        if (window.managerCommon) {
                            window.managerCommon.showAlert('无法解析该文件，请确保它是有效的浏览器导出的 HTML 收藏夹。', 'error');
                        } else {
                            alert('无法解析该文件');
                        }
                    }
                };
                reader.readAsText(file);
                // 重置 input 以便下次选择同一文件也能触发 change
                fileInput.value = '';
            });

            // 刷新按钮
            refreshBtn.addEventListener('click', () => {
                if (savedBookmarks) {
                    // 显示加载状态
                    container.innerHTML = `
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p class="text-muted">正在刷新收藏夹...</p>
                        </div>
                    `;

                    setTimeout(() => {
                        renderBookmarks(savedBookmarks, container);
                        if (window.managerCommon) window.managerCommon.showAlert('收藏夹已刷新');
                    }, 500);
                } else {
                    if (window.managerCommon) window.managerCommon.showAlert('请先导入收藏夹文件');
                }
            });

            // 页面加载时自动加载已保存的收藏夹
            if (savedBookmarks) {
                renderBookmarks(savedBookmarks, container);
            }
        });
    </script>

    <!-- 深色模式功能 -->
    <script src="../../js/dark-mode.js"></script>
</body>
